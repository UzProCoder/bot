name: 24/7 Telegram Bot Runner

on:
  push:
    branches: [ main, master ]
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

concurrency:
  group: telegram-bot
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Kodni yuklab olish
      uses: actions/checkout@v4

    - name: Python-ni sozlash
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Kutubxonalarni o'rnatish
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Botni 5.5 soat davomida ishga tushirish
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        ADMIN_ID: ${{ secrets.ADMIN_ID }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: |
        python Bot.py &
        BOT_PID=$!
        echo "Bot $BOT_PID ID bilan ishga tushdi."
        sleep 19800
        kill $BOT_PID
        echo "Bot navbatdagi sikl uchun to'xtatildi."
